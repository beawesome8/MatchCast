services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wc
      POSTGRES_PASSWORD: wc
      POSTGRES_DB: wc26
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wc -d wc26"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://wc:wc@db:5432/wc26
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
