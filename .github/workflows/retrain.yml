name: Scheduled Retraining

on:
  schedule:
    # Every 6 hours. Cron is UTC. Adjust during/after the tournament as needed.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}  # allows manual trigger from the Actions tab, for testing

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run retraining pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python -m matchcast.pipeline | tee pipeline_result.json

      - name: Score predictions against real outcomes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m matchcast.scoring | tee scoring_result.json

      - name: Summarize result
        if: always()
        run: |
          echo "## Retraining run result" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat pipeline_result.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "## Scoring result" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat scoring_result.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"